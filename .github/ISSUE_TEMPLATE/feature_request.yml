name: Feature Request
description: Suggest an improvement or new feature
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in fit.

  - type: dropdown
    id: language
    attributes:
      label: Language / SDK
      options:
        - Go (CLI)
        - Go (library)
        - TypeScript
        - Python
        - Rust
        - PHP
        - All
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.
